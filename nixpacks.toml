# Railway/Nixpacks: explicit Python build and start
# Fixes "Railpack could not determine how to build the app"

providers = ["python"]

[phases.setup]
aptPkgs = ["gcc", "libpq-dev"]

[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHONPATH = "/app"
PYTHONUNBUFFERED = "1"
